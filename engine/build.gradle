plugins {
    id 'java-library'
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

repositories {
    mavenCentral()
}

dependencies {
    // Pure-Java rules engine: no framework dependencies.
    // Jackson databind 用於讀取宣告式場景資料(resources/scenarios/*.json,A1/A2);
    // 版本與伺服器(Spring Boot 3.3)同代。
    compileOnly 'com.fasterxml.jackson.core:jackson-annotations:2.17.2'
    implementation 'com.fasterxml.jackson.core:jackson-databind:2.17.2'

    testImplementation platform('org.junit:junit-bom:5.10.3')
    testImplementation 'org.junit.jupiter:junit-jupiter'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
    // 驗證存檔序列化/反序列化 round-trip
    testImplementation 'com.fasterxml.jackson.core:jackson-databind:2.17.2'
    testImplementation 'com.fasterxml.jackson.module:jackson-module-parameter-names:2.17.2'
}

tasks.named('test') {
    useJUnitPlatform()
}

// Keep record component names in the bytecode so the server's Jackson can bind
// these records to/from JSON reliably.
tasks.withType(JavaCompile).configureEach {
    options.compilerArgs << '-parameters'
}
